[package]
name = "localgpt-gen"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "LocalGPT Gen — AI-driven 3D scene generation"
readme = "README.md"
keywords = ["ai", "3d", "scene-generation", "bevy", "localgpt"]
categories = ["command-line-utilities", "graphics"]

[[bin]]
name = "localgpt-gen"
path = "src/main.rs"

[dependencies]
localgpt-core = { workspace = true }
localgpt-world-types = { workspace = true }
localgpt-cli-tools = { workspace = true }

tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
reqwest = { workspace = true }
futures = { workspace = true }

clap = { version = "4.6", features = ["derive"] }

# 3D generation via Bevy
bevy = "0.18"
bevy_egui = "0.39"
image = "0.25"

# glTF/GLB export
gltf-json = { version = "1", features = ["names"] }

# Path resolution
shellexpand = { workspace = true }

# CLI line editor
rustyline = "17.0.2"

# Procedural audio (environmental soundscapes)
fundsp = "0.23"
cpal = "0.17"

# World skill serialization
ron = "0.9"

# Content hashing for sync/drift detection
sha2 = "0.10"
hex = "0.4"

# Timestamps for experiment tracking
chrono = { workspace = true }

# ZIP packaging for world distribution
zip = "2"

# File locking for GPU exclusivity (unix only, used by gpu_lock)
libc = "0.2"

# WebSocket inspector protocol (Spec 0.6)
axum = { version = "0.8", features = ["ws"] }

# Physics and character controller (P1, P5)
# avian3d 0.6 + bevy-tnua 0.30 + bevy-tnua-avian3d 0.11 — all target Bevy 0.18
avian3d = { version = "0.6", optional = true }
bevy-tnua = { version = "0.30", optional = true }
bevy-tnua-avian3d = { version = "0.11", optional = true }

# Noise for procedural terrain (P3)
noise = "0.9"

# Interpolation for animations
splines = "4.4"

# Random number generation (for NPC wander, foliage scattering)
rand = "0.9"

# File locking for GPU exclusivity (Windows)
[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_Storage_FileSystem"] }

[features]
default = ["physics"]
physics = ["dep:avian3d", "dep:bevy-tnua", "dep:bevy-tnua-avian3d"]
