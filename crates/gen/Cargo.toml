[package]
name = "localgpt-gen"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "LocalGPT Gen — AI-driven 3D scene generation"
readme = "README.md"
keywords = ["ai", "3d", "scene-generation", "bevy", "localgpt"]
categories = ["command-line-utilities", "graphics"]

[[bin]]
name = "localgpt-gen"
path = "src/main.rs"

[dependencies]
localgpt-core = { workspace = true }
localgpt-world-types = { workspace = true }
localgpt-cli-tools = { workspace = true }

tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
reqwest = { workspace = true }
futures = { workspace = true }

clap = { version = "4.5", features = ["derive"] }

# 3D generation via Bevy
bevy = "0.18"
image = "0.25"

# glTF/GLB export
gltf-json = { version = "1", features = ["names"] }

# Path resolution
shellexpand = { workspace = true }

# CLI line editor
rustyline = "17.0.2"

# Procedural audio (environmental soundscapes)
fundsp = "0.23"
cpal = "0.17"

# World skill serialization
toml = "0.8"
ron = "0.9"

# Physics and character controller (P1, P5)
# NOTE: avian3d 0.6 stable is not yet released for Bevy 0.18.
# These deps are behind the "physics" feature gate until avian3d 0.6 ships.
avian3d = { version = "0.5", optional = true }
bevy-tnua = { version = "0.28.0", optional = true }
bevy-tnua-avian3d = { version = "0.2.0", optional = true }

# Noise for procedural terrain (P3)
noise = "0.9"

# Interpolation for animations
splines = "4.3"

# Random number generation (for NPC wander, foliage scattering)
rand = "0.9"

[features]
default = []
# Enable physics integration (requires avian3d 0.5 + bevy 0.17 compat)
# Disabled by default until avian3d 0.6 stable ships for Bevy 0.18
physics = ["dep:avian3d", "dep:bevy-tnua", "dep:bevy-tnua-avian3d"]
